name: "TrojanChat Security Hygiene & Verification Matrix"

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: trojanchat-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-hygiene:
    name: "Code Quality Assurance / Code Hygiene Enforcement"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality tooling
        run: python -m pip install --upgrade pip ruff black bandit
      - name: Validate Python syntax
        run: python -m compileall -q app backend tests
      - name: Run blocking Ruff and Bandit checks
        run: |
          ruff check backend/api.py backend/routes backend/services app/core/security.py benchmarks tests/test_api.py tests/test_backend_hardening.py tests/test_benchmark.py --fix
          ruff check backend/api.py backend/routes backend/services app/core/security.py benchmarks tests/test_api.py tests/test_backend_hardening.py tests/test_benchmark.py tests/test_security.py
          bandit -q backend/api.py backend/config.py backend/routes/*.py backend/services/*.py app/core/inference_cache.py app/core/security.py app/services/chat_service.py -f json -o bandit-report.json
      - name: Upload static-analysis report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-report
          path: bandit-report.json
      - name: Publish formatting advisory
        run: |
          black --check app backend tests/test_api.py tests/test_chat_service.py tests/test_inference_cache.py \
            || echo "Formatting differences detected; run Black locally before the next cleanup PR."

  test-matrix:
    name: "Continuous Integration / Python ${{ matrix.python-version }}"
    needs: code-hygiene
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run maintained unit and API tests
        env:
          PYTHONPATH: .
          CACHE_ENABLED: "false"
        run: |
          pytest \
            tests/test_api.py \
            tests/test_chat_service.py \
            tests/test_inference_cache.py \
            tests/test_backend_hardening.py \
            tests/test_benchmark.py \
            tests/test_security.py \
            --cov=backend.api \
            --cov=backend.routes.chat_routes \
            --cov=backend.routes.ws_routes \
            --cov=backend.services.chat_service \
            --cov=app.core.inference_cache \
            --cov=app.services.chat_service \
            --cov-fail-under=90 \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-results.xml \
            -v
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-python-${{ matrix.python-version }}
          path: |
            coverage.xml
            pytest-results.xml
          if-no-files-found: warn

  dependency-audit:
    name: "Supply Chain / Dependency Audit"
    needs: code-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - name: Install audit tooling
        run: pip install pip-audit
      - name: Enforce dependency audit
        run: |
          pip-audit -r requirements.txt --progress-spinner off --format json --output pip-audit.json
      - name: Upload dependency audit
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: warn

  frontend-build:
    name: "Continuous Integration / Frontend Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm install --ignore-scripts
      - name: Enforce high-severity dependency audit
        run: npm audit --audit-level=high
      - name: Build production frontend
        run: npm run build

  container-smoke-test:
    name: "Deployment / Container Build & Smoke Test"
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t trojanchat:${{ github.sha }} .
      - name: Verify image starts
        run: |
          docker run -d --rm --name trojanchat-ci -p 8000:8000 trojanchat:${{ github.sha }}
          trap 'docker logs trojanchat-ci || true' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

  release-readiness:
    name: "Release Engineering / Artifact Readiness"
    needs: [test-matrix, dependency-audit, frontend-build, container-smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate release metadata
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.MD
          test -f Dockerfile
          test -f .github/dependabot.yml
          echo "TrojanChat release-readiness contract passed."
